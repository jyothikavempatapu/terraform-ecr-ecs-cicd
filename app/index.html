<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jyothika — Cloud App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 2.5rem 3rem;
      max-width: 480px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: #1e3a5f;
      color: #63b3ed;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 1.8rem; font-weight: 600; margin-bottom: 0.75rem; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 1.5rem; }
    .stack {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .tag {
      background: #2d3748;
      color: #a0aec0;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Running on AWS ECS Fargate</span>
    <h1>Jyothika Vempatapu</h1>
    <p>Cloud Engineer · Cybersecurity · AWS<br>
       This app is deployed via a GitHub Actions CI/CD pipeline<br>
       to AWS ECS Fargate using Terraform.</p>
    <div class="stack">
      <span class="tag">Docker</span>
      <span class="tag">ECR</span>
      <span class="tag">ECS Fargate</span>
      <span class="tag">Terraform</span>
      <span class="tag">GitHub Actions</span>
    </div>
  </div>
</body>
</html>
